site_name: API.log
site_description: The developer's personal log, filtering the noise of the AI world into hard-won findings.
site_url: https://alptimus.github.io/Alptimus/
theme:
    name: material
    features:
        - content.code.copy
        - navigation.footer
        - search.suggest
        - search.highlight
        # - navigation.indexes
markdown_extensions:
    - pymdownx.highlight:
          anchor_linenums: true
          line_spans: __span
          pygments_lang_class: true
    - pymdownx.inlinehilite
    - pymdownx.snippets
    - pymdownx.superfences
    - attr_list
    - md_in_html
extra:
    generator: false
    # social:
    #     - icon: fontawesome/brands/mastodon
    #       name: squidfunk on Mastodon
    #       link: https://fosstodon.org/@squidfunk
plugins:
    - search
    - blog:
        blog_toc: true
nav:
  - Home: index.md
  - Courses:
    - Django:
      - courses/django/index.md
      - Introduction: courses/django/section-1-2.md
      - Baseline Setup: courses/django/section-3.md
      - Hands-on Django: courses/django/section-4-1.md
      - Scaling the Project: courses/django/section-4-2.md
    - AWS:
      - courses/aws/index.md
      - AWS Configuration: courses/aws/section-5-6.md
      - AWS Integration Phase-I: courses/aws/section-7.md
      - AWS Integration Phase-II: courses/aws/section-8.md
  - Blog:
     - blog/index.md
     - blog/posts/llamafile_docker.md