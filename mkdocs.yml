site_name: API.log
site_description: The developer's personal log, filtering the noise of the AI world into hard-won findings.
site_url: https://alptimus.github.io/Alptimus/
theme:
    name: material
    features:
        - content.code.copy
        - navigation.footer
        - search.suggest
        - search.highlight
        # - navigation.indexes
markdown_extensions:
    - pymdownx.highlight:
          anchor_linenums: true
          line_spans: __span
          pygments_lang_class: true
    - pymdownx.inlinehilite
    - pymdownx.snippets
    - pymdownx.superfences
    - attr_list
    - md_in_html
extra:
    generator: false
    social:
        - icon: fontawesome/brands/github
          name: GitHub
          link: https://github.com/Alptimus
        - icon: fontawesome/brands/linkedin
          name: LinkedIn
          link: https://www.linkedin.com/in/abhishekacharya11/
        - icon: fontawesome/solid/heart
          name: Ko-fi
          link: https://ko-fi.com/alptimus
plugins:
    - search
    - blog:
        blog_toc: true
nav:
  - Home: index.md
  - Blog:
     - blog/index.md
     - blog/posts/llamafile_docker.md
  - Courses:
    - Django:
      - courses/django/index.md
      - Introduction: courses/django/section-1-2.md
      - Baseline Setup: courses/django/section-3.md
      - Hands-on Django: courses/django/section-4-1.md
      - Scaling the Project: courses/django/section-4-2.md
    - AWS:
      - courses/aws/index.md
      - AWS Configuration: courses/aws/section-5-6.md
      - AWS Integration Phase-I: courses/aws/section-7.md
      - AWS Integration Phase-II: courses/aws/section-8.md
  - External Projects:
     - external-projects/index.md
     - Chatbot Budget (CPU): external-projects/chatbot-budget-cpu.md
     - Chatbot Budget (Colab): external-projects/chatbot-budget-colab.md
     - Legal AI ChatBot: external-projects/legal-ai-chatbot.md